## atuin config — managed by chezmoi (personal machines only)
## https://docs.atuin.sh/configuration/config/

## Self-hosted sync server
sync_address = "https://atuin.crappy.network"
auto_sync = true
sync_frequency = "5m"

## Press Enter to put the selected command on the prompt line (edit before running);
## press Enter again to run it. Good for picking an ssh host then tweaking it.
enter_accept = true

## Ctrl-R: fuzzy full-text search across ALL machines (global filter).
search_mode = "fuzzy"
filter_mode = "global"

## Up arrow: traditional prefix history search (commands starting with what you've
## typed, e.g. "ssh " + Up), but against the full synced db from every machine.
search_mode_shell_up_key_binding = "prefix"
filter_mode_shell_up_key_binding = "global"

## Compact, inline UI rather than fullscreen.
style = "compact"
inline_height = 20
show_preview = true
