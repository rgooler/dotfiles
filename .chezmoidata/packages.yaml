packages:
    core:
        taps:
        - 'homebrew/bundle'
        - 'homebrew/services'
        brews:
        - 'age'
        - 'btop'
        - 'chezmoi'
        - 'coreutils'
        - 'curl'
        - 'git'
        - 'grep'
        - 'htop'
        - 'jq'
        - 'mise'
        - 'nmap'
        - 'sqlite'
        - 'tree'
        - 'vim'
        - 'wget'
        - 'zoxide'
        - 'zsh'
        casks:
    personal:
        core:
            taps:
            brews:
            - 'atuin'
            - 'gnupg'
            casks:
            npm:
            pip:
        darwin:
            taps:
            brews:
            - 'ripgrep'
            - 'rsync'
            - 'semgrep'
            casks:
            - 'google-chrome'
            - 'signal'
            - 'tailscale-app'
            - 'visual-studio-code'
            - 'vlc'
        linux:
            taps:
            brews:
            casks:
            # Fedora desktop: vendor dnf repos are configured in
            # run_onchange_install-linux-packages.sh.tmpl
            dnf:
            - 'code'                 # VS Code (packages.microsoft.com)
            - 'google-chrome-stable' # Chrome (dl.google.com)
            - 'tailscale'            # Tailscale (pkgs.tailscale.com)
            - '1password'            # 1Password desktop app (for SSH agent)
            flatpak:
            - 'org.signal.Signal'
            - 'org.videolan.VLC'
    work:
        core:
            taps:
            brews:
            casks:
            npm:
            pip:
        darwin:
            taps:
            brews:
            casks:
        linux:
            taps:
            brews:
            casks:
    darwin:
        taps:
        - '1password/tap'
        brews:
        casks:
        - '1password-cli'
    linux:
        taps:
        brews:
        casks:
