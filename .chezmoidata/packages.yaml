# Package sets, installed in order by the package scripts:
#   1. baseline.all   — every machine, every OS
#   2. baseline.gui   — machines where .gui is true (desktop/work)
#   3. profiles.<p>   — each bundle listed in .profiles (dev/media/ctf)
# Dispatch is by .pkgmgr (dnf | apt | brew). Nerd fonts come via externals
# (Linux) / brew casks (macOS), not from here. Repos for code/docker/gh/etc.
# are configured in run_once_before_install-package-managers.sh.tmpl.
packages:
  baseline:
    all:
      dnf:
      - 'age'
      - 'binwalk'
      - 'btop'
      - 'chezmoi'
      - 'git'
      - 'glow'
      - 'gnupg2'
      - 'jq'
      - 'mise'
      - 'rclone'
      - 'sqlite'
      - 'tree'
      - 'vim-enhanced'
      - 'wget'
      - 'zoxide'
      - 'zsh'
      apt:
      - 'age'
      - 'binwalk'
      - 'btop'
      - 'git'
      - 'glow'            # requires charm apt repo (added in before-script)
      - 'gnupg'
      - 'jq'
      - 'mise'            # requires mise apt repo (added in before-script)
      - 'rclone'
      - 'sqlite3'
      - 'tree'
      - 'vim'
      - 'zoxide'
      - 'zsh'
      # chezmoi on apt: installed via get.chezmoi.io in before-script (not packaged)
      brew:
      - 'age'
      - 'binwalk'
      - 'btop'
      - 'chezmoi'
      - 'coreutils'
      - 'curl'
      - 'git'
      - 'glow'
      - 'gnupg'
      - 'grep'
      - 'jq'
      - 'mise'
      - 'rclone'
      - 'sqlite'
      - 'tree'
      - 'vim'
      - 'watch'
      - 'wget'
      - 'zoxide'
      - 'zsh'
    gui:
      dnf:
      - 'code'                    # VS Code (packages.microsoft.com)
      - 'tailscale'               # Tailscale (pkgs.tailscale.com)
      - '1password'               # 1Password desktop app (SSH agent)
      - 'sqlitebrowser'           # DB Browser for SQLite
      - 'cascadia-code-nf-fonts'  # Cascadia Code Nerd Font (p10k prompt)
      apt:
      - 'code'
      - 'tailscale'
      - '1password'
      - 'sqlitebrowser'
      - 'fonts-cascadia-code'     # Nerd glyphs in recent versions
      brew: []
      casks:                      # macOS GUI apps
      - 'visual-studio-code'
      - '1password'
      - 'tailscale-app'
      - 'db-browser-for-sqlite'
      - 'font-caskaydia-cove-nerd-font'  # Cascadia Code Nerd Font
      flatpak:
      - 'org.signal.Signal'
  profiles:
    dev:
      dnf:
      - 'gh'                   # GitHub CLI (gh-cli repo)
      - 'docker-ce'            # Docker Engine (docker-ce repo)
      - 'docker-ce-cli'
      - 'docker-buildx-plugin'
      - 'docker-compose-plugin'
      - 'docker-ce-rootless-extras'
      - 'containerd.io'
      apt:
      - 'gh'
      - 'docker-ce'
      - 'docker-ce-cli'
      - 'docker-buildx-plugin'
      - 'docker-compose-plugin'
      - 'docker-ce-rootless-extras'
      - 'containerd.io'
      brew:
      - 'gh'
      - 'ripgrep'
      - 'rsync'
      - 'semgrep'
      casks:
      - 'docker'
      flatpak: []
    media:
      dnf: []
      apt: []
      brew: []
      casks:
      - 'vlc'
      flatpak:
      - 'org.videolan.VLC'
      - 'tv.plex.PlexDesktop'
      - 'fedora:io.mpv.Mpv'   # flathub build had issues; use the fedora remote
      - 'fr.handbrake.ghb'
    ctf:
      dnf:
      - 'nmap'
      - 'john'
      - 'arp-scan'
      apt:
      - 'nmap'
      - 'john'
      - 'arp-scan'
      brew:
      - 'nmap'
      - 'john'
      casks: []
      flatpak:
      - 'org.ghidra_sre.Ghidra'
    emulation:
      # rclone is in baseline.all; flock ships with util-linux. inotify-tools
      # provides inotifywait for the recursive save-watcher; restic does the
      # versioned snapshot backups (rollback).
      dnf:
      - 'inotify-tools'
      - 'restic'
      apt:
      - 'inotify-tools'
      - 'restic'
      brew: []
      casks: []
      flatpak:
      - 'net.retrodeck.retrodeck'
